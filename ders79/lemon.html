<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

        let card = document.querySelector("#card");
        card.style.backgroundColor = "#f2f2f2";

            start.innerText = "Doritos doner dadli. Almaq ucun bu nomreye zeng edin +994 50 555 55 55";
                information[1].style.color = "green";
                information[1].innerText = "qiymet : 1 dene gunes sistemi";
                card.style.border = "2px solid blue";
            });
    </script> 
</body>
