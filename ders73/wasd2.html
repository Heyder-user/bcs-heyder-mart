<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<body>
    <script>
        class Dordbucagli {
            constructor(uzunlug, hundurluy) {
                this.uzunlug = uzunlug;
                this.hundurluy = hundurluy;
            }
            getArea() {
                return this.uzunlug * this.hundurluy;
            }
        }
        const rect = new Dordbucagli(5, 10);
        console.log(rect.getArea());
    </script>
</body>
